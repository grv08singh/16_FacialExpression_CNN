artifacts_root: "artifacts"

data_ingestion:
  root_dir: "artifacts/data_ingestion"
  local_data_file: "notebooks/data/data.zip"
  unzip_dir: "artifacts/data_ingestion"

prepare_base_model:
  root_dir: "artifacts/models"
  base_model_path: "artifacts/models/base_model.h5"
  updated_base_model_path: "artifacts/models/updated_base_model.h5"

training:
  root_dir: "artifacts/training"
  trained_model_path: "artifacts/models/trained_model.h5"
  train_dir: "artifacts/data_ingestion/data/train"
  val_report: "artifacts/training/validation_report.yaml"

evaluation:
  root_dir: "artifacts/evaluation"
  test_dir: "artifacts/data_ingestion/data/test"
  evaluation_report: "artifacts/evaluation/evaluation_report.yaml"
  mlflow_uri: "http://localhost:5000"